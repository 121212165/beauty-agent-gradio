<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美妆智能体</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#333;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:20px}
h1{color:#d63384;margin-bottom:20px;font-size:1.8rem}
h2{color:#d63384;margin-bottom:12px;font-size:1.3rem}
.tabs{display:flex;border-bottom:2px solid #d63384;margin-bottom:20px}
.tab-btn{background:#f0f0f0;color:#333;padding:10px 18px;border:none;cursor:pointer;border-radius:6px 6px 0 0;margin-right:4px;font-size:15px;transition:.2s}
.tab-btn.active{background:#d63384;color:#fff}
.tab-content{display:none;background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.tab-content.active{display:block}
textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;min-height:100px;font-size:15px;resize:vertical;margin-bottom:12px}
textarea:focus{outline:none;border-color:#d63384;box-shadow:0 0 0 3px rgba(214,51,132,.15)}
.btn{background:#d63384;color:#fff;padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:15px;transition:.2s}
.btn:hover{background:#b0276c}
.btn:disabled{background:#ccc;cursor:not-allowed}
.examples{margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap}
.ex-btn{background:#fde7f3;color:#333;padding:5px 12px;border:1px solid #d63384;border-radius:4px;cursor:pointer;font-size:13px}
.ex-btn:hover{background:#f0b6d3}
.section{margin-top:20px}
.section h3{color:#d63384;margin-bottom:8px;font-size:1.1rem}
.results{background:#fafafa;border:1px solid #eee;border-radius:6px;padding:16px;min-height:60px}
.results ul{padding-left:20px}
.results li{margin-bottom:8px;padding:6px 10px;border-radius:4px;font-size:14px}
.err-typo{background:#ffdddd;border-left:3px solid #f44336}
.err-rule{background:#fff0dd;border-left:3px solid #ff9800}
.compare{display:flex;gap:16px;margin-top:12px}
.compare>div{flex:1;padding:12px;border:1px solid #eee;border-radius:6px;background:#fafafa}
.compare h4{color:#d63384;margin-bottom:8px}
.actions{display:none;gap:10px;margin-top:12px;flex-wrap:wrap}
.highlight-typo{background:yellow}
.highlight-forbidden{background:orange;text-decoration:line-through}
.tooltip{position:relative;display:inline-block;cursor:help}
.tooltip .tip{visibility:hidden;width:200px;background:#555;color:#fff;text-align:center;border-radius:6px;padding:6px;position:absolute;z-index:1;bottom:125%;left:50%;margin-left:-100px;opacity:0;transition:opacity .3s;font-size:12px}
.tooltip:hover .tip{visibility:visible;opacity:1}
.info{background:#f8f9fa;border:1px solid #e9ecef;border-radius:6px;padding:16px;margin-top:16px}
.info h3{color:#d63384;margin-bottom:8px}
.info ul{padding-left:20px}
.info li{margin-bottom:4px;font-size:14px}
.loading{color:#888;font-style:italic}
</style>
</head>
<body>
<div class="container">
<h1>美妆智能体 - 文案合规审查</h1>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab(0)">文字分析</button>
  <button class="tab-btn" onclick="switchTab(1)">设计理念</button>
</div>

<div id="tab0" class="tab-content active">
  <h2>美妆文案输入</h2>
  <div class="examples">
    <button class="ex-btn" onclick="loadEx(1)">违规词示例</button>
    <button class="ex-btn" onclick="loadEx(2)">夸大效果示例</button>
    <button class="ex-btn" onclick="loadEx(3)">赛题案例</button>
  </div>
  <textarea id="input" placeholder="输入或粘贴美妆文案、评论、广告词..."></textarea>
  <button class="btn" id="analyzeBtn" onclick="analyze()">开始分析</button>

  <div class="section">
    <h3>分析结果</h3>
    <div id="results" class="results"><p>分析结果将在此显示...</p></div>
  </div>

  <div class="section">
    <h3>修改建议</h3>
    <div id="suggestions" class="results"></div>
    <div id="actionBtns" class="actions">
      <button class="btn" onclick="applyAll()">一键应用所有建议</button>
      <button class="btn" onclick="showCompare()">查看修改前后对比</button>
    </div>
    <div id="compare" style="display:none" class="compare">
      <div><h4>修改前</h4><div id="before"></div></div>
      <div><h4>修改后</h4><div id="after"></div></div>
    </div>
  </div>

  <div class="section">
    <h3>相关资料</h3>
    <div id="resources" class="results"></div>
  </div>
</div>

<div id="tab1" class="tab-content">
  <h2>设计理念</h2>
  <div class="info">
    <h3>核心目标</h3>
    <p>帮助美妆品牌方、内容创作者、营销人员快速审查和优化美妆内容，确保合规性并提升质量。</p>
    <h3>解决的痛点</h3>
    <ul>
      <li><strong>内容错误：</strong>错别字、不恰当用词影响专业形象</li>
      <li><strong>合规风险：</strong>违禁词、虚假宣传可能导致处罚</li>
      <li><strong>效率低下：</strong>人工审核耗时且标准不一</li>
    </ul>
    <h3>功能模块</h3>
    <ul>
      <li>错别字与语法检测</li>
      <li>违禁词与合规风险审查</li>
      <li>用词优化与文案改进建议</li>
      <li>一键应用修改与前后对比</li>
    </ul>
  </div>
</div>
</div>

<script>
const EX1='这款美白精华是我用过最好的产品，能够彻底祛斑，100%安全无害，适合所有肤质，使用后立即见效，肌肤白皙透亮，完全根治黑色素沉淀问题。';
const EX2='我们的抗皱面霜采用纯天然成分，无任何副作用，一周内可以明显去除所有皱纹，让你重返18岁少女肌，效果持久永不反弹，是市面上最有效的抗衰老产品。';
const EX3='生活需要妆，美丽不打烊！但凡精制的女生，都不会放弃自我管理。脸蛋只有一张，精制一点又何妨？用了这款特效面霜，我的肌肤就像剥了壳的鸡蛋一样立刻变白，色斑色块全部消失，仿佛皮肤吃了仙丹一样，一夜见效，完全无副作用，效果简直绝绝子！';

let currentResult=null, improvedText=null;

function switchTab(i){
  document.querySelectorAll('.tab-content').forEach((el,j)=>el.classList.toggle('active',j===i));
  document.querySelectorAll('.tab-btn').forEach((el,j)=>el.classList.toggle('active',j===i));
}

function loadEx(n){document.getElementById('input').value=[EX1,EX2,EX3][n-1]}

function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

async function analyze(){
  const text=document.getElementById('input').value.trim();
  const resEl=document.getElementById('results');
  const sugEl=document.getElementById('suggestions');
  const resDiv=document.getElementById('resources');

  if(!text){resEl.innerHTML='<p>请输入内容后再分析。</p>';return}

  document.getElementById('analyzeBtn').disabled=true;
  resEl.innerHTML='<p class="loading">正在分析中...</p>';
  sugEl.innerHTML='';resDiv.innerHTML='';
  document.getElementById('actionBtns').style.display='none';
  document.getElementById('compare').style.display='none';

  try{
    const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    if(!r.ok){const e=await r.json();throw new Error(e.error||'请求失败')}
    const {data}=await r.json();
    currentResult=data;

    let processed=text;
    if(data.errors?.length){
      data.errors.forEach(e=>{
        const cls=e.type==='typo'?'highlight-typo':'highlight-forbidden';
        if(processed.includes(e.text)){
          processed=processed.replace(new RegExp(esc(e.text),'g'),
            `<span class="${cls} tooltip">${e.text}<span class="tip">${e.suggestion||e.reason||''}</span></span>`);
        }
      });
    }
    resEl.innerHTML=`<p><strong>原文（带标注）：</strong></p><div>${processed}</div>`;

    let shtml='<ul>';
    if(data.errors?.length){
      data.errors.forEach(e=>{
        shtml+=`<li class="${e.type==='typo'?'err-typo':'err-rule'}">"${e.text}"${e.reason?' — '+e.reason:''}${e.suggestion?' → 建议：'+e.suggestion:''}</li>`;
      });
    }
    if(data.suggestions?.length){
      data.suggestions.forEach(s=>{
        shtml+=`<li>"${s.original}" → "${s.improved}"（${s.reason}）</li>`;
      });
    }
    shtml+=shtml==='<ul>'?'<li>暂无具体修改建议。</li>':'';
    shtml+='</ul>';
    sugEl.innerHTML=shtml;

    let rhtml='<ul>';
    if(data.resources?.length){
      data.resources.forEach(r=>{
        rhtml+=typeof r==='object'?`<li><strong>${r.title||'资源'}</strong>: ${r.relevance||''}</li>`:`<li>${r}</li>`;
      });
    }
    if(data.compliance?.issues?.length){
      rhtml+=`<li>合规性问题：${data.compliance.issues.join(', ')} (评分: ${data.compliance.score||'N/A'})</li>`;
    }
    rhtml+=rhtml==='<ul>'?'<li>暂无相关资料。</li>':'';
    rhtml+='</ul>';
    resDiv.innerHTML=rhtml;

    document.getElementById('actionBtns').style.display='flex';
    document.getElementById('before').textContent=text;
    improvedText=data.improved_full_text||genImproved(text,data);
    document.getElementById('after').textContent=improvedText;
  }catch(err){
    resEl.innerHTML=`<p style="color:red">分析失败：${err.message}</p>`;
  }finally{
    document.getElementById('analyzeBtn').disabled=false;
  }
}

function genImproved(text,data){
  let t=text;
  data.errors?.forEach(e=>{if(e.suggestion)t=t.replace(new RegExp(esc(e.text),'g'),e.suggestion)});
  data.suggestions?.forEach(s=>{if(s.improved)t=t.replace(new RegExp(esc(s.original),'g'),s.improved)});
  return t;
}

function applyAll(){
  if(improvedText){document.getElementById('input').value=improvedText;alert('已应用所有修改建议！')}
  else alert('没有可应用的修改建议。');
}

function showCompare(){document.getElementById('compare').style.display='flex'}
</script>
</body>
</html>
